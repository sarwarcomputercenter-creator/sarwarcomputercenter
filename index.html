    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    
    <style>
        body { font-family: 'Poppins', 'Noto Sans Devanagari', sans-serif; overflow-x: hidden; scroll-behavior: smooth; background-color: #f8fafc; }
        
        /* Brand Colors */
        .bg-brand-blue { background-color: #0f172a; } 
        .text-brand-blue { color: #0f172a; }
        .bg-brand-orange { background-color: #ea580c; }
        .text-brand-orange { color: #ea580c; }

        /* Custom Hover & Card Effects */
        .glass-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.2); }
        .course-card { transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .course-card:hover { transform: translateY(-10px) scale(1.02); box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1); border-color: #ea580c; }
        
        /* Video Gallery Overlay */
        .video-overlay { background: rgba(0,0,0,0.4); transition: all 0.3s ease; }
        .video-card:hover .video-overlay { background: rgba(0,0,0,0.1); }
        .video-card:hover .play-icon { transform: scale(1.2); color: #ea580c; }

        /* Floating Elements Animation */
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
            100% { transform: translateY(0px); }
        }
        .floating-element { animation: float 6s ease-in-out infinite; }

        /* Sticky Social Bar */
        .sticky-social { position: fixed; top: 50%; left: 0; transform: translateY(-50%); z-index: 100; display: flex; flex-direction: column; gap: 5px; }
        .sticky-social a { width: 50px; height: 50px; display: flex; align-items: center; justify-content: center; color: white; font-size: 24px; transition: all 0.3s; border-radius: 0 10px 10px 0; box-shadow: 2px 2px 5px rgba(0,0,0,0.2); margin-left: -5px; }
        .sticky-social a:hover { width: 60px; margin-left: 0; }
        .social-yt { background-color: #ff0000; }
        .social-ig { background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%); }
        .social-fb { background-color: #1877f2; }
        .social-map { background-color: #34a853; }

        /* Floating WhatsApp Button */
        .float-wa { position: fixed; width: 60px; height: 60px; bottom: 30px; right: 30px; background-color: #25d366; color: #FFF; border-radius: 50px; text-align: center; font-size: 32px; box-shadow: 0px 4px 10px rgba(0,0,0,0.3); z-index: 100; transition: transform 0.3s; }
        .float-wa:hover { transform: scale(1.1) rotate(10deg); }
        .float-wa i { margin-top: 14px; }

        /* Floating Call Button */
        .float-call { position: fixed; height: 60px; bottom: 30px; left: 30px; background-color: #2563eb; color: #FFF; border-radius: 50px; display: flex; align-items: center; justify-content: center; padding: 0 25px; gap: 10px; font-size: 18px; font-weight: bold; box-shadow: 0px 4px 10px rgba(0,0,0,0.3); z-index: 100; transition: all 0.3s; }
        .float-call:hover { transform: scale(1.05); background-color: #1d4ed8; }
        .float-call i { animation: ring 2s infinite; font-size: 22px; }
        @keyframes ring { 0% { transform: rotate(0); } 10% { transform: rotate(15deg); } 20% { transform: rotate(-15deg); } 30% { transform: rotate(15deg); } 40% { transform: rotate(-15deg); } 50% { transform: rotate(0); } }

        /* Mobile Adjustments */
        @media (max-width: 768px) {
            .float-call span { display: none; }
            .float-call { padding: 0; width: 60px; justify-content: center; left: 20px; bottom: 20px;}
            .float-wa { right: 20px; bottom: 20px; }
            .sticky-social { display: none; } 
        }

        /* Group Dropdown Styling */
        optgroup { font-weight: bold; color: #0f172a; font-style: normal; }
        option { font-weight: normal; color: #374151; }
    </style>
</head>
